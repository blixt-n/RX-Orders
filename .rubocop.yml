# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

AllCops:
  Exclude:
    - "Rakefile"
    - "bin/**/*"
    - "public/**/*"
    - "storage/**/*"
    - "vendor/**/*"
    - "tmp/**/*"
    - "config/**/*"
    - "db/schema.rb"
    - "db/migrate/*"
    - "docker-compose.yml"
    - "Dockerfile"
    - "Gemfile"
    - "Gemfile.lock"
    - "spec/rails_helper.rb"
    - "spec/spec_helper.rb"
